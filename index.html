<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>물아 흘러라</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 class="title">물아 흘러라</h1>
  <div class="subtitle">지형 물흐름 분석기</div>
</header>

<div id="viewer">

  <canvas id="mapCanvas"></canvas>

  <div id="arrowSelect">
    화살표 스타일
    <select id="arrowStyle">
      <option value="basic">기본</option>
      <option value="triangle">삼각형</option>
      <option value="bold">굵은</option>
    </select>
  </div>

  <div id="dropzone">
    DXF 파일을<br>여기로 끌어오세요
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
